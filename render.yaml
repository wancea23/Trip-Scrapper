services:
  - type: web
    name: trip-scrapper
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python web.py
    envVars:
      # Set your Travelpayouts token in the Render dashboard (Environment tab).
      # Leave it as a dashboard secret instead of committing it to the repo.
      - key: TRAVELPAYOUTS_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.6"
